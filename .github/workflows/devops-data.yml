name: "DevOps: Star Catalog"
# Rebuilds the Tier 1 star catalog from the AT-HYG source on the runner,
# verifies it with the S1 round-trip gate (count, SHA-256, Sirius/Vega
# spot-check), and only then syncs it to s3://{bucket}/data/tier1/.
# The pipeline is deterministic — the runner's output is byte-identical to
# the gate-tested build (pipeline/build_tier1.py sorts by catalog id).
#
# Triggers: manual (workflow_dispatch) or a change to pipeline/**.
#
# Auth: GitHub OIDC → assumes the stars-ci role. No AWS keys in Secrets.
#
# Required GitHub Variables (auto-set by devops-infra.yml):
#   S3_BUCKET, CLOUDFRONT_DIST_ID

on:
  push:
    branches: [master]
    paths:
      - 'pipeline/**'
  workflow_dispatch:

concurrency:
  group: devops-data
  cancel-in-progress: false

env:
  AWS_DEFAULT_REGION: us-west-2

permissions:
  id-token: write   # OIDC token for AWS role assumption
  contents: read

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::491696534851:role/stars-ci
          aws-region: us-west-2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline dependencies
        run: pip install pandas numpy

      - name: Build Tier 1 catalog (downloads AT-HYG source, ~200 MB)
        run: python pipeline/build_tier1.py --force

      - name: Round-trip gate test
        run: python pipeline/test_tier1.py

      - name: Sync catalog to S3
        run: |
          aws s3 sync pipeline/data/tier1/ \
            s3://${{ vars.S3_BUCKET }}/data/tier1/ \
            --cache-control "public,max-age=86400"

      - name: Invalidate CloudFront /data/*
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} \
            --paths "/data/*"
