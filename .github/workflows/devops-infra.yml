name: "DevOps: Infrastructure"
# Adapted from mbroadfo/spa-on-aws (static-only: no Lambda vars, no SSM secrets job).
# Runs Terraform plan + apply, then sets GitHub Variables (CLOUDFRONT_DIST_ID,
# S3_BUCKET). Cloudflare DNS (ACM validation + app CNAME) is managed inside
# Terraform via the cloudflare provider — no separate dns job, no first-run
# deadlock waiting on a record that doesn't exist yet.
#
# Auth: GitHub OIDC → assumes the stars-terraform role. No AWS keys in Secrets.
#
# Required GitHub Secrets (all set by scripts/bootstrap-oidc.ps1):
#   TF_STATE_BUCKET
#   TF_VAR_APP_NAME, TF_VAR_ENVIRONMENT, TF_VAR_CUSTOM_DOMAIN
#   CLOUDFLARE_ZONE_ID, CLOUDFLARE_API_TOKEN
#   GH_TOKEN

on:
  push:
    branches: [master]
    paths:
      - 'terraform/**'
  workflow_dispatch:

concurrency:
  group: devops-infrastructure
  cancel-in-progress: false

env:
  AWS_DEFAULT_REGION: us-west-2

permissions:
  id-token: write   # OIDC token for AWS role assumption
  contents: read

jobs:
  infra:
    runs-on: ubuntu-latest
    outputs:
      cf_dist_id: ${{ steps.out.outputs.cf_dist_id }}
      cf_domain:  ${{ steps.out.outputs.cf_domain }}
      s3_bucket:  ${{ steps.out.outputs.s3_bucket }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::491696534851:role/stars-terraform
          aws-region: us-west-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_VAR_APP_NAME }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_DEFAULT_REGION }}"

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_app_name:             ${{ secrets.TF_VAR_APP_NAME }}
          TF_VAR_environment:          ${{ secrets.TF_VAR_ENVIRONMENT }}
          TF_VAR_custom_domain:        ${{ secrets.TF_VAR_CUSTOM_DOMAIN }}
          TF_VAR_cloudflare_zone_id:   ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply tfplan

      - name: Capture outputs
        id: out
        working-directory: terraform
        run: |
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cf_domain=$(terraform output -raw cloudfront_domain)"           >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)"              >> "$GITHUB_OUTPUT"

  vars:
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - name: Update GitHub Variables
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          gh variable set CLOUDFRONT_DIST_ID --repo "$REPO" --body "${{ needs.infra.outputs.cf_dist_id }}"
          gh variable set S3_BUCKET          --repo "$REPO" --body "${{ needs.infra.outputs.s3_bucket }}"
