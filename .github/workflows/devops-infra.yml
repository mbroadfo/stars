name: "DevOps: Infrastructure"
# Adapted from mbroadfo/spa-on-aws (static-only: no Lambda vars, no SSM secrets job).
# Runs Terraform plan + apply, then in parallel:
#   - Sets ACM certificate DNS validation records in Cloudflare
#   - Adds app CNAME in Cloudflare → CloudFront
#   - Sets GitHub Variables (CLOUDFRONT_DIST_ID, S3_BUCKET)
#
# Required GitHub Secrets (all set by scripts/bootstrap.sh):
#   TERRAFORM_AWS_ACCESS_KEY_ID / TERRAFORM_AWS_SECRET_ACCESS_KEY
#   TF_STATE_BUCKET
#   TF_VAR_APP_NAME, TF_VAR_ENVIRONMENT, TF_VAR_CUSTOM_DOMAIN
#   CLOUDFLARE_ZONE_ID, CLOUDFLARE_API_TOKEN
#   GH_TOKEN

on:
  push:
    branches: [master]
    paths:
      - 'terraform/**'
  workflow_dispatch:

concurrency:
  group: devops-infrastructure
  cancel-in-progress: false

env:
  AWS_DEFAULT_REGION: us-west-2

jobs:
  infra:
    runs-on: ubuntu-latest
    outputs:
      cf_dist_id:     ${{ steps.out.outputs.cf_dist_id }}
      cf_domain:      ${{ steps.out.outputs.cf_domain }}
      s3_bucket:      ${{ steps.out.outputs.s3_bucket }}
      acm_cname_name: ${{ steps.out.outputs.acm_cname_name }}
      acm_cname_value: ${{ steps.out.outputs.acm_cname_value }}
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.TERRAFORM_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_VAR_APP_NAME }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_DEFAULT_REGION }}"

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_app_name:      ${{ secrets.TF_VAR_APP_NAME }}
          TF_VAR_environment:   ${{ secrets.TF_VAR_ENVIRONMENT }}
          TF_VAR_custom_domain: ${{ secrets.TF_VAR_CUSTOM_DOMAIN }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply tfplan

      - name: Capture outputs
        id: out
        working-directory: terraform
        run: |
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)"      >> "$GITHUB_OUTPUT"
          echo "cf_domain=$(terraform output -raw cloudfront_domain)"                >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)"                   >> "$GITHUB_OUTPUT"
          echo "acm_cname_name=$(terraform output -raw acm_validation_cname_name)"   >> "$GITHUB_OUTPUT"
          echo "acm_cname_value=$(terraform output -raw acm_validation_cname_value)" >> "$GITHUB_OUTPUT"

  dns:
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - name: Add ACM validation CNAME to Cloudflare
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CNAME_NAME: ${{ needs.infra.outputs.acm_cname_name }}
          CNAME_VAL:  ${{ needs.infra.outputs.acm_cname_value }}
        run: |
          NAME="${CNAME_NAME%.}"
          VAL="${CNAME_VAL%.}"
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"CNAME\",\"name\":\"${NAME}\",\"content\":\"${VAL}\",\"ttl\":60,\"proxied\":false}")
          SUCCESS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))")
          if [[ "$SUCCESS" == "True" ]]; then
            echo "ACM validation CNAME added — certificate validates in ~5 minutes"
          else
            ERRORS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('errors',[]))")
            if echo "$ERRORS" | grep -qi "already exists"; then
              echo "ACM validation CNAME already exists — OK"
            else
              echo "Cloudflare error: $ERRORS"; exit 1
            fi
          fi

      - name: Add app CNAME to Cloudflare → CloudFront
        env:
          CF_ZONE_ID:    ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_TOKEN:      ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CUSTOM_DOMAIN: ${{ secrets.TF_VAR_CUSTOM_DOMAIN }}
          CF_DOMAIN:     ${{ needs.infra.outputs.cf_domain }}
        run: |
          SUBDOMAIN=$(echo "$CUSTOM_DOMAIN" | cut -d. -f1)
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"CNAME\",\"name\":\"${SUBDOMAIN}\",\"content\":\"${CF_DOMAIN}\",\"ttl\":1,\"proxied\":false,\"comment\":\"spa-on-aws\"}")
          SUCCESS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))")
          if [[ "$SUCCESS" == "True" ]]; then
            echo "App CNAME: $CUSTOM_DOMAIN → $CF_DOMAIN"
            echo "Live at: https://$CUSTOM_DOMAIN (once ACM validates)"
          else
            ERRORS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('errors',[]))")
            if echo "$ERRORS" | grep -qi "already exists"; then
              echo "App CNAME already exists — OK"
            else
              echo "Cloudflare error: $ERRORS"; exit 1
            fi
          fi

  vars:
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - name: Update GitHub Variables
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          gh variable set CLOUDFRONT_DIST_ID --repo "$REPO" --body "${{ needs.infra.outputs.cf_dist_id }}"
          gh variable set S3_BUCKET          --repo "$REPO" --body "${{ needs.infra.outputs.s3_bucket }}"
